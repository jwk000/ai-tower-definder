id: level_02
name: 沙漠虫潮
description: 灼热沙漠中双路虫群汹涌而来。钻地蠕虫从隧道口突袭，蝗虫群从空中压制，母虫坐镇压轴。玩家须同时防御地面与隧道两个战线，考验多路部署与防控节奏。
sceneDescription: 正午烈日炙烤的荒漠平原，焦黄沙土在热浪中微微颤抖。西侧两处虫巢巨穴（0,2）与（0,6）各自向东延伸出一条蚁道，在东端汇聚于水晶基座（20,4）。沙丘起伏处埋伏着隧道口，随时可能喷出钻地蠕虫；天际偶有沙暴席卷而过，塔楼射程在风沙中骤降。
