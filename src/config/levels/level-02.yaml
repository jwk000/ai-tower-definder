id: L2_desert
name: 沙漠
theme: desert
description: 蜿蜒的沙漠路径，岩石阻碍了建造空间
sceneDescription: 古代商路的沙漠遗迹。沙漠掠夺者、沙岩铠甲兵和沙漠术士据守此地。第6波强盗头目现身，第12波沙虫巨兽压阵。岩石限制了防御塔的布置。

map:
  name: 沙漠
  cols: 21
  rows: 9
  tileSize: 64

  # 21 columns × 9 rows — TileType string values
  tiles:
    # Row 0
    - [empty, empty, spawn, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    # Row 1
    - [empty, empty, path,  empty, blocked, empty, empty, blocked, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    # Row 2
    - [blocked, empty, path, path, path, path, blocked, path, path, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    # Row 3
    - [empty, empty, path, path, path, path, empty, empty, path, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    # Row 4
    - [blocked, empty, path, empty, path, empty, blocked, empty, path, path, path, path, path, path, path, path, path, path, path, path, base]
    # Row 5
    - [empty, empty, path, path, blocked, path, path, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    # Row 6
    - [path, path, path, blocked, path, path, path, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    # Row 7
    - [blocked, empty, empty, empty, path, blocked, path, blocked, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]
    # Row 8
    - [path, path, path, blocked, path, path, path, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty, empty]

  enemyPath:
    - { row: 0, col: 2 }
    - { row: 3, col: 2 }
    - { row: 3, col: 5 }
    - { row: 6, col: 5 }
    - { row: 6, col: 1 }
    - { row: 8, col: 1 }
    - { row: 8, col: 6 }
    - { row: 5, col: 6 }
    - { row: 5, col: 3 }
    - { row: 2, col: 3 }
    - { row: 2, col: 8 }
    - { row: 4, col: 8 }
    - { row: 4, col: 20 }

  tileColors:
    empty: '#c9a96e'
    path: '#8b7355'
    blocked: '#795548'
    spawn: '#e6c44d'
    base: '#1e88e5'

  obstacles:
    - { type: rock,   row: 0, col: 6 }
    - { type: rock,   row: 0, col: 14 }
    - { type: rock,   row: 3, col: 15 }
    - { type: rock,   row: 7, col: 18 }
    - { type: rock,   row: 6, col: 13 }
    - { type: cactus, row: 1, col: 10 }
    - { type: cactus, row: 2, col: 18 }
    - { type: cactus, row: 5, col: 16 }
    - { type: cactus, row: 7, col: 3 }
    - { type: cactus, row: 8, col: 9 }
    - { type: bones,  row: 1, col: 14 }
    - { type: bones,  row: 3, col: 10 }
    - { type: bones,  row: 5, col: 19 }
    - { type: bones,  row: 7, col: 0 }
    - { type: bones,  row: 8, col: 16 }

# ── Starting resources ──
starting:
  gold: 250

# ── Available towers & units ──
available:
  towers: [arrow, cannon, laser]
  units: []

# ── Weather ──
weather:
  pool: [sunny, fog, night]
  initial: sunny

# ── Random pools (from design doc) ──
banPool: ~
neutralPool: ~

# ── Waves (12 waves total) ──
waves:
  - waveNumber: 1
    enemies:
      - { enemyType: grunt, count: 6, spawnInterval: 1.3 }
    spawnDelay: 2

  - waveNumber: 2
    enemies:
      - { enemyType: grunt, count: 8, spawnInterval: 1.1 }
    spawnDelay: 2

  - waveNumber: 3
    enemies:
      - { enemyType: grunt,  count: 4, spawnInterval: 1.0 }
      - { enemyType: runner, count: 4, spawnInterval: 0.7 }
    spawnDelay: 2

  - waveNumber: 4
    enemies:
      - { enemyType: runner, count: 8, spawnInterval: 0.5 }
    spawnDelay: 2

  - waveNumber: 5
    enemies:
      - { enemyType: grunt, count: 6, spawnInterval: 1.0 }
      - { enemyType: heavy, count: 2, spawnInterval: 2.0 }
    spawnDelay: 3

  - waveNumber: 6
    isBossWave: true
    enemies:
      - { enemyType: grunt,          count: 3, spawnInterval: 1.0 }
      - { enemyType: boss_commander, count: 1, spawnInterval: 0   }
      - { enemyType: runner,         count: 2, spawnInterval: 0.6 }
    spawnDelay: 3

  - waveNumber: 7
    enemies:
      - { enemyType: heavy, count: 5, spawnInterval: 1.8 }
    spawnDelay: 2

  - waveNumber: 8
    enemies:
      - { enemyType: mage,  count: 3, spawnInterval: 1.5 }
      - { enemyType: runner, count: 4, spawnInterval: 0.6 }
    spawnDelay: 2

  - waveNumber: 9
    enemies:
      - { enemyType: grunt,    count: 5, spawnInterval: 1.0 }
      - { enemyType: exploder, count: 3, spawnInterval: 1.2 }
    spawnDelay: 2

  - waveNumber: 10
    enemies:
      - { enemyType: heavy, count: 4, spawnInterval: 1.8 }
      - { enemyType: mage,  count: 3, spawnInterval: 1.5 }
    spawnDelay: 3

  - waveNumber: 11
    enemies:
      - { enemyType: runner,   count: 5, spawnInterval: 0.5 }
      - { enemyType: exploder, count: 4, spawnInterval: 1.0 }
    spawnDelay: 2

  - waveNumber: 12
    isBossWave: true
    enemies:
      - { enemyType: boss_beast, count: 1, spawnInterval: 0   }
      - { enemyType: heavy,      count: 3, spawnInterval: 1.8 }
      - { enemyType: runner,     count: 3, spawnInterval: 0.5 }
    spawnDelay: 4
