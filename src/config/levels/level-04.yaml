id: L4_volcano
name: 火山
theme: volcano
description: 熔岩地形限制了建造空间，敌人拥有火焰抗性
sceneDescription: 活火山的斜坡上，岩浆河从裂缝中涌出，将黑曜石般的大地切割成支离破碎的岛屿。烧焦的树干像炭化的骨骼指向天空，火山砾石铺满了所有可以立足的地方。火山灰如黑雪般飘落，空气中弥漫着硫磺的气味。敌人在这种极端环境中如鱼得水。
