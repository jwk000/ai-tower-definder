id: level_04
name: 失落神庙
description: 丛林深处的沉没神庙，两条钳形通道将守军拦截点一分为二。上古石柱机关横亘要道，石化巨像在最终波次从幽暗中醒来，以毁灭性的质量石化横扫一切抵抗。
sceneDescription: 赤道密林笼罩的远古神庙遗址，21 格宽的丛林沼地被两条蜿蜒钳形古道贯穿。上路从西北 spawn S0 (row=2,col=0) 沿 row 2 水平东进，在 col=10 折向南方与下路汇合；下路从西南 spawn S1 (row=6,col=0) 沿 row 6 水平东进，同样在 col=10 折向北方与上路会合，随后由 row 4 直抵东侧水晶 B (row=4,col=20)。八根神庙石柱林立于汇合段两侧，残破的古像点缀路旁，藤蔓蔓延每一道裂隙。
