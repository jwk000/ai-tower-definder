id: level_05
name: 沉没港口
description: 曾经繁荣的港口在一场神秘海潮后半数沉没，锈迹斑斑的铁锚与破旧船骸散布其间。海盗与深海生物从三个方向同时涌入，共同指向水晶停泊处的残破灯塔。退潮时浅滩露出，路径在瞬息之间改变，守方必须随机应变。
sceneDescription: 黄昏时分的沉没港口，海水漫过半截码头，残破的木栈道只剩三条勉强能行的通道——上路、中路、下路——最终汇聚于东侧那座依然燃烧的灯塔。海盗旗插在西岸礁石上，克拉肯的触手偶尔从水面探出，潮汐机关控制着中路浅滩的现身与隐没。
