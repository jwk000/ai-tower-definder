id: level_01
name: 平原
description: 青翠的草原上点缀着野花和灌木丛。一条土路从村庄延伸而来，蜿蜒穿过田野。这里是哥布林侦察兵经常出没的地方，村民们已经加固了道路尽头的基地。微风吹过，草浪起伏，看似平静的表面下暗藏杀机。
sceneDescription: 广袤的草原上，一条宽阔的土路从山脚蜿蜒而出，横穿整个平原后折返，经过麦田和农舍，最终通向那座被村民加固过的石墙基地。哥布林侦察兵常年沿此路南下劫掠，如今村民们已在沿途布下防御。
