waves:
  # 设计稿 §2.4：8 波 BASELINE flavor，总敌数 56
  - waveNumber: 1
    spawnDelay: 2
    enemies:
      - { enemyType: grunt, count: 4, spawnInterval: 1.5 }
  - waveNumber: 2
    spawnDelay: 30
    enemies:
      - { enemyType: grunt, count: 5, spawnInterval: 1.0 }
      - { enemyType: runner, count: 2, spawnInterval: 0.6 }
  - waveNumber: 3
    spawnDelay: 30
    enemies:
      - { enemyType: grunt, count: 6, spawnInterval: 1.0 }
      - { enemyType: runner, count: 2, spawnInterval: 0.6 }
