id: level_01
name: 边境绿野
description: 翠绿的草原上一条直道从西延伸到东。哥布林从远方涌来，村民们以最简单的箭塔和弩弓抵御第一波入侵。本关是 Run 的起始，教学单 spawn 直线推进与建塔基本操作。
sceneDescription: 春末黄昏的边境草原，最后一缕阳光斜照过 21 格宽的平原。从西侧寨门 (0,4) 一路向东延伸到东侧水晶 (20,4) 的土路是哥布林南下的唯一通道。两侧麦田随风起伏，几棵孤树点缀其间。
