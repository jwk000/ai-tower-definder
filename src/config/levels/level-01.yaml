id: level_01
name: 边境绿野
description: 翠绿的草原上一条蜿蜒土路自西向东穿越平原。哥布林沿 Z 形路径推进，给玩家更多布塔窗口与节奏感。本关是 Run 的起始，引导玩家适应单 spawn 多拐弯路径与基础建塔操作。
sceneDescription: 春末黄昏的边境草原，最后一缕阳光斜照过 21 格宽的平原。土路从西侧寨门 (0,4) 起步东行，在 (5,4) 拐向北侧麦田 (5,1)，再东行 10 格至 (15,1) 折向南穿越草原至 (15,7)，最后东行 5 格再北转抵达东侧水晶 (20,4)。Z 形路径两侧麦田、孤树、灌木丛点缀其间。
