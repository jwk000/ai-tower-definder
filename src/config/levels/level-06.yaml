id: level_06
name: 齿轮工厂
description: 锈蚀的巨型齿轮悬在头顶，传送带横贯厂区中央。三条流水线同时涌入的机械敌人在烟雾中疾速推进，炼钢大师在最终波次驾驶双形态战车压境。玩家需应对三路同步压力与传送带加速机关，在灰霾笼罩的厂区完成最后的防守。
sceneDescription: 蒸汽朋克风格的地下铸造厂，铁灰色厂房顶部的烟囱不断喷出煤烟。上方（row 0）和下方（row 8）两条重型轨道与中央传送带（row 3 col 3-19）构成三路并行流水线，三路敌军最终在东侧熔炉塔（col 20）前汇合冲击水晶锚点。
