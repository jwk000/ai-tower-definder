id: level_08
name: 异界终战
description: 虚空裂缝撕裂大地中央，旧日支配者从异界降临。双路钳形地形汇聚于中央水晶，关 2-7 精英混编潮水般涌来，随后异界先驱开启传送门召唤援军，最终三形态终极 Boss 降临。这是 Run 的最终考验，胜则封印虚空，败则轮回重启。
sceneDescription: 巨型虚空裂缝横贯战场中央，紫黑色能量涌动的大地分裂为南北两翼。北路从 S0 沿裂缝边缘蜿蜒向东折向中央水晶，南路对称镜像。四根异界石柱矗立场中，现实扭曲光晕笼罩整个战场。水晶锚点悬浮于战场正中，不断吸收四面八方的虚空能量——这是最后的防线。
