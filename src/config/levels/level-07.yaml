id: level_07
name: 孢子菌林
description: 幽暗的菌林深处，5 处菌母巢穴散布于地图各角落，源源不断地孵化孢子幼体。玩家须在孢子雾的持续侵蚀下优先清除菌母，才能阻断无休止的虫群浪潮。本关是 Run 第 7 关，SUMMONER 剧本的极限考验。
sceneDescription: 灰紫色天空下的腐生菌林，21 格宽的地面被厚厚的菌丝毯覆盖。中央直道（row 4）从西侧 S0 蔓延至东侧水晶 B，两侧各有 2-3 处巨型菌母巢穴发出幽光。空气中漂浮着淡紫色孢子雾，玩家士兵在此呼吸便会受到持续伤害。
