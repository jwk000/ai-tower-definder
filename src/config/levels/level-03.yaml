id: level_03
name: 极地暴雪要塞
description: 冰封的极北要塞，S 形蜿蜒的雪道贯穿整片冰原。冰霜雪怪在暴风雪的掩护下列阵攻来，冰面减速区与霜冻塔联动是击退双泰坦的关键。
sceneDescription: 永夜降临的极北要塞，21 格宽的冰原在暴风雪中若隐若现。从西侧寨门 (0,4) 出发的雪路蜿蜒 S 形穿越冰原，两段冰面 (row=7 col=14-17) 是天然减速带，最终抵达东侧水晶锚点 (20,4)。厚实的冰柱与积雪堆散布四周，寒风呼啸不止。
