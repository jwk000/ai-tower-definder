        color: "#ffffff"
        duration: 0.1
    onCreate:
      - type: visual_flash_loop
        alphaRange: [0.5, 1.0]
        speed: 8

---
# Boss指挥官 — 召唤+Buff型Boss
boss_commander:
  id: boss_commander
  name: 指挥官
  category: Enemy
  faction: Enemy
  layer: Ground
  tier: L3
  isBoss: true

  stats:
    hp: 800
    atk: 30
    attackSpeed: 0.7
    range: 100
    speed: 40
    armor: 60
    mr: 40
    damageType: physical

  reward:
    gold: 100
    energy: 30

  visual:
    shape: circle
    color: "#ffd54f"
    size: 72
    outline: true
    crown: true

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: follow_path

  ai_tree: boss_commander_ai

  skills:
    - id: summon_grunts
      name: 召唤小兵
      cooldown: 12
      energyCost: 0
      range: 150
      value: 3
      description: 在周围召唤3个小兵
    - id: war_cry
      name: 战吼
      cooldown: 15
      energyCost: 0
      range: 300
      value: 30
      buffId: war_cry_buff
      description: 范围内所有敌人+30%速度+20%ATK，持续5s

  lifecycle:
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onCreate:
      - type: hp_bar_boss
      - type: play_sound
        sound: SFX_BOSS_SPAWN
    onCondition:
      condition: "hp_ratio < 0.5"
      fireOnce: true
      effects:
        - type: enter_phase2
        - type: play_effect
          effect: boss_rage
        - type: pause_world
          duration: 0.3
        - type: change_color
          color: "#d32f2f"
          blend: 0.35
        - type: stat_change
          speedBonus: 0.3
          attackSpeedBonus: 0.5
    onKill:
      - type: play_effect
        effect: boss_death
      - type: play_sound
        sound: SFX_BOSS_DIE

---
# Boss攻城兽 — 砸地+分裂型Boss
boss_beast:
  id: boss_beast
  name: 攻城兽
  category: Enemy
  faction: Enemy
  layer: Ground
  tier: L3
  isBoss: true

  stats:
    hp: 1000
    atk: 40
    attackSpeed: 0.5
    range: 80
    speed: 35
    armor: 80
    mr: 20
    damageType: physical

  reward:
    gold: 120

  visual:
    shape: circle
    color: "#ff7043"
    size: 80
    outline: true
    crown: true

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: follow_path
    special:
      canAttackBuildings: true

  ai_tree: boss_beast_ai

  skills:
    - id: ground_slam
      name: 砸地
      cooldown: 10
      energyCost: 0
      range: 150
      value: 50
      description: 150px内50点AOE伤害+50%减速，持续2s

  lifecycle:
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onCreate:
      - type: hp_bar_boss
      - type: play_sound
        sound: SFX_BOSS_SPAWN
    onCondition:
      condition: "hp_ratio < 0.5"
      fireOnce: true
      effects:
        - type: split_into
          count: 2
          unitType: boss_beast_spawn
        - type: play_effect
          effect: boss_split
    onKill:
      - type: play_effect
        effect: boss_death
      - type: play_sound
        sound: SFX_BOSS_DIE
