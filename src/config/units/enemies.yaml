# 自爆虫 — 死亡时AOE爆炸
exploder:
  id: exploder
  name: 自爆虫
  category: Enemy
  faction: Enemy
  layer: Ground
  tier: L2

  stats:
    hp: 40
    atk: 10
    speed: 90
    armor: 0
    mr: 0
    damageType: physical

  reward:
    gold: 12

  visual:
    shape: circle
    color: "#ff8a65"
    size: 24
    outline: true

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: follow_path

  lifecycle:
