        sound: SFX_BOSS_SPAWN
    onCondition:
      condition: "hp_ratio < 0.5"
      fireOnce: true
      effects:
        - type: split_into
          count: 2
          unitType: boss_beast_spawn
        - type: play_effect
          effect: boss_split
    onKill:
      - type: play_effect
        effect: boss_death
      - type: play_sound
        sound: SFX_BOSS_DIE

