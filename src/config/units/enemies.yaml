# 小兵 — 最基础敌方单位
grunt:
  id: grunt
  name: 小兵
  category: Enemy
  faction: Enemy
  layer: Ground
  tier: L1

  stats:
    hp: 50
    atk: 5
    attackSpeed: 1.0
    speed: 80
    armor: 0
    mr: 0
    damageType: physical

  reward:
    gold: 10

  visual:
    shape: circle
    color: "#ef5350"
    size: 24
    outline: true

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: follow_path

  lifecycle:
    onDeath:
      - type: drop_gold
      - type: play_effect
        effect: death_basic
      - type: play_sound
        sound: SFX_ENEMY_DIE
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onCreate:
