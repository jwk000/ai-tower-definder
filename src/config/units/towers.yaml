# 蝙蝠塔 — 特殊条件激活塔
bat_tower:
  id: bat_tower
  name: 蝙蝠塔
  category: Tower
  faction: Player
  layer: LowAir

  stats:
    hp: 90
    atk: 25
    attackSpeed: 0.75
    range: 200
    armor: 0
    mr: 0
    damageType: magic

  cost:
    build: 85
    upgrade: [50, 80, 120, 175]
    atkGrowth: [7, 10, 15, 21]
    rangeGrowth: [15, 15, 20, 20]

  visual:
    shape: rect
    color: "#7c4dff"
    size: 34
    outline: false

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: hold_position
    special:
      batCount: 3
      batReplenishCD: 5.0
