# ============================================================
# Tower Defender — 我方移动单位（士兵）配置
# ============================================================
# 设计文档: design/03-unit-data.md

# 盾卫 — 坦克/嘲讽
shield_guard:
  id: shield_guard
  name: 盾卫
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 300
    atk: 8
    attackSpeed: 0.8
    range: 50
    speed: 60
    armor: 40
    mr: 5
    damageType: physical
    moveRange: 200

  cost:
    build: 50
    pop: 2

  visual:
    shape: rect
    color: "#4dd0e1"
    size: 30
    outline: true
    symbol: cross

  behavior:
    targetSelection: nearest
    attackMode: single_target
    movementMode: player_directed

  skills:
    - id: taunt
      name: 嘲讽
      cooldown: 8
      energyCost: 20
      range: 120
      value: 0
      buffId: taunt_buff
      description: 强制周围敌人攻击自己，持续3秒

  lifecycle:
    onDeath:
      - type: play_effect
        effect: death_soldier
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1

---
# 剑士 — DPS/旋风斩
swordsman:
  id: swordsman
  name: 剑士
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 150
    atk: 15
    attackSpeed: 1.0
    range: 55
    speed: 80
    armor: 10
    mr: 0
    damageType: physical
    moveRange: 250

  cost:
    build: 50
    pop: 2

  visual:
    shape: rect
    color: "#e57373"
    size: 26
    outline: true
    symbol: cross

  behavior:
    targetSelection: nearest
    attackMode: aoe_splash
    movementMode: player_directed
    special:
      splashRadius: 80
      splashDamage: 30

  skills:
    - id: whirlwind
      name: 旋风斩
      cooldown: 6
      energyCost: 15
      range: 80
      value: 30
      description: 对周围敌人造成30点AOE伤害

  lifecycle:
    onDeath:
      - type: play_effect
        effect: death_soldier
    onHit:
      - type: flash_color
        color: "#ffffff"
        duration: 0.1
    onAttack:
      - type: play_animation
        animation: whirlwind_spin

