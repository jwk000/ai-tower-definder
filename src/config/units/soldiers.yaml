# 刺客 — 高机动/暗杀
assassin:
  id: assassin
  name: 刺客
  category: Soldier
  faction: Player
  layer: Ground

  stats:
    hp: 70
    atk: 35
    attackSpeed: 1.5
    range: 40
    speed: 110
    armor: 0
    mr: 0
    damageType: physical
    moveRange: 300

  cost:
    build: 60
    pop: 3

  visual:
    shape: rect
    color: "#ab47bc"
    size: 22
    outline: true
    symbol: cross

  behavior:
    targetSelection: weakest
    attackMode: single_target
    movementMode: player_directed

  skills:
    - id: assassinate
      name: 暗杀
      cooldown: 8
