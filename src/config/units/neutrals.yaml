# ============================================================
# Tower Defender — 中立单位配置
# ============================================================
# 设计文档: design/03-unit-data.md

# 尖刺陷阱 — 地面机关
spike_trap:
  id: spike_trap
  name: 尖刺陷阱
  category: Trap
  faction: Neutral
  layer: AboveGrid

  stats:
    hp: 1

  cost:
    build: 40

  attack:
    atk: 30
    damageType: physical
    triggerRadius: 32
    cooldown: 2.0
    maxPerLevel: 5
    pathOnly: true

  visual:
    shape: triangle_cluster
    color: "#e53935"
    size: 28
    outline: false
    alpha: 0.6

  behavior:
    targetSelection: nearest
    attackMode: dot_aoe
    movementMode: hold_position
    special:
      triggerCondition: enemy_on_tile
      aoeRadius: 32

  lifecycle:
    onCreate:
      - type: visual_dim
        alpha: 0.6
    onAction:
      - type: visual_flash_bright
        color: "#ff0000"
        duration: 0.2
      - type: play_sound
        sound: SFX_TRAP_TRIGGER

---
# 治疗泉水 — 范围治疗中立单位
healing_spring:
  id: healing_spring
  name: 治疗泉水
  category: Neutral
  faction: Neutral
  layer: Ground

  stats:
    hp: -1  # 不可摧毁

  heal:
    amount: 5      # HP/秒
    radius: 120

  visual:
    shape: hexagon
    color: "#4dd0e1"
    size: 32
    outline: true

  behavior:
    movementMode: hold_position
    special:
      isIndestructible: true

  lifecycle:
    onCreate:
      - type: visual_pulse
        frequency: 2.0

---
# 金币宝箱 — 可击碎的金币来源
gold_chest:
  id: gold_chest
  name: 金币宝箱
  category: Neutral
  faction: Neutral
  layer: Ground

  stats:
    hp: 30
    armor: 20

  reward:
    goldMin: 50
    goldMax: 100

  visual:
    shape: rect
    color: "#ffd54f"
    size: 24
    outline: true

  behavior:
    movementMode: hold_position

  lifecycle:
    onCreate:
      - type: visual_flash_random
        interval: [2.0, 5.0]
    onDeath:
      - type: drop_gold_random
        min: 50
        max: 100
      - type: play_effect
        effect: gold_burst
      - type: play_sound
        sound: SFX_CHEST_OPEN
